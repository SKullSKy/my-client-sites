<!DOCTYPE html>
<html lang="en" class="scroll-smooth">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Nature Interiors — Luxury Living</title>
<script src="https://cdn.tailwindcss.com"></script>
<style>
  @import url('https://fonts.googleapis.com/css2?family=Cormorant+Garamond:ital,wght@0,300;0,400;0,600;1,300;1,400&family=Montserrat:wght@200;300;400;500&display=swap');

  * { font-family: 'Montserrat', sans-serif; }
  .serif { font-family: 'Cormorant Garamond', serif; }

  body {
    background: #0a0a0a;
    color: #ffffff;
    overflow-x: hidden;
  }

  .primary-gradient {
    background: linear-gradient(135deg, #0a0a0a 0%, #1a1a1a 25%, #2d2d2d 50%, #1a1a1a 75%, #0a0a0a 100%);
  }

  .glass {
    background: rgba(255,255,255,0.04);
    backdrop-filter: blur(24px);
    -webkit-backdrop-filter: blur(24px);
    border: 1px solid rgba(212,175,55,0.15);
  }

  .glass-dark {
    background: rgba(10,10,10,0.75);
    backdrop-filter: blur(32px);
    -webkit-backdrop-filter: blur(32px);
    border: 1px solid rgba(212,175,55,0.12);
  }

  .gold { color: #d4af37; }
  .gold-border { border-color: #d4af37; }
  .bg-forest { background-color: #2c3e2d; }
  .gold-bg { background-color: #d4af37; }

  .gold-gradient-text {
    background: linear-gradient(135deg, #d4af37 0%, #f0d060 40%, #b8952a 70%, #d4af37 100%);
    -webkit-background-clip: text;
    -webkit-text-fill-color: transparent;
    background-clip: text;
  }

  .hero-bg {
    background:
      radial-gradient(ellipse at 20% 50%, rgba(44,62,45,0.4) 0%, transparent 60%),
      radial-gradient(ellipse at 80% 20%, rgba(212,175,55,0.08) 0%, transparent 50%),
      radial-gradient(ellipse at 60% 80%, rgba(44,62,45,0.25) 0%, transparent 50%),
      linear-gradient(135deg, #0a0a0a 0%, #1a1a1a 25%, #2d2d2d 50%, #1a1a1a 75%, #0a0a0a 100%);
  }

  .parallax-img {
    transform: translateZ(0);
    transition: transform 0.8s cubic-bezier(0.25, 0.46, 0.45, 0.94);
  }

  .parallax-img:hover {
    transform: scale(1.05) translateZ(0);
  }

  .bento-card {
    position: relative;
    overflow: hidden;
    transition: all 0.5s cubic-bezier(0.25, 0.46, 0.45, 0.94);
  }

  .bento-card:hover {
    transform: translateY(-6px);
    border-color: rgba(212,175,55,0.5);
    box-shadow: 0 30px 80px rgba(0,0,0,0.6), 0 0 40px rgba(212,175,55,0.08);
  }

  .bento-card::before {
    content: '';
    position: absolute;
    inset: 0;
    background: linear-gradient(135deg, rgba(212,175,55,0.05) 0%, transparent 60%);
    opacity: 0;
    transition: opacity 0.5s ease;
    z-index: 1;
  }

  .bento-card:hover::before { opacity: 1; }

  .nav-pill {
    background: rgba(10,10,10,0.85);
    backdrop-filter: blur(40px);
    -webkit-backdrop-filter: blur(40px);
    border: 1px solid rgba(212,175,55,0.2);
    border-radius: 9999px;
  }

  .btn-gold {
    background: linear-gradient(135deg, #d4af37 0%, #f0d060 50%, #b8952a 100%);
    color: #0a0a0a;
    font-weight: 600;
    letter-spacing: 0.1em;
    transition: all 0.4s ease;
  }

  .btn-gold:hover {
    box-shadow: 0 0 40px rgba(212,175,55,0.5), 0 10px 40px rgba(0,0,0,0.4);
    transform: translateY(-2px);
  }

  .btn-outline-gold {
    border: 1px solid #d4af37;
    color: #d4af37;
    letter-spacing: 0.1em;
    transition: all 0.4s ease;
  }

  .btn-outline-gold:hover {
    background: rgba(212,175,55,0.1);
    box-shadow: 0 0 30px rgba(212,175,55,0.2);
  }

  .divider-gold {
    height: 1px;
    background: linear-gradient(90deg, transparent, #d4af37, transparent);
  }

  .noise-overlay {
    position: fixed;
    inset: 0;
    pointer-events: none;
    z-index: 0;
    opacity: 0.02;
    background-image: url("data:image/svg+xml,%3Csvg viewBox='0 0 256 256' xmlns='http://www.w3.org/2000/svg'%3E%3Cfilter id='noise'%3E%3CfeTurbulence type='fractalNoise' baseFrequency='0.9' numOctaves='4' stitchTiles='stitch'/%3E%3C/filter%3E%3Crect width='100%25' height='100%25' filter='url(%23noise)'/%3E%3C/svg%3E");
  }

  .floating-orb {
    position: absolute;
    border-radius: 50%;
    filter: blur(80px);
    pointer-events: none;
    animation: float 8s ease-in-out infinite;
  }

  @keyframes float {
    0%, 100% { transform: translateY(0px) translateX(0px); }
    33% { transform: translateY(-30px) translateX(15px); }
    66% { transform: translateY(20px) translateX(-10px); }
  }

  .text-reveal {
    opacity: 0;
    transform: translateY(30px);
    animation: reveal 1.2s ease forwards;
  }

  @keyframes reveal {
    to { opacity: 1; transform: translateY(0); }
  }

  .delay-200 { animation-delay: 0.2s; }
  .delay-400 { animation-delay: 0.4s; }
  .delay-600 { animation-delay: 0.6s; }
  .delay-800 { animation-delay: 0.8s; }

  .gallery-item {
    overflow: hidden;
    position: relative;
  }

  .gallery-item::after {
    content: '';
    position: absolute;
    inset: 0;
    background: linear-gradient(to top, rgba(10,10,10,0.8) 0%, transparent 60%);
    opacity: 0;
    transition: opacity 0.5s ease;
  }

  .gallery-item:hover::after { opacity: 1; }

  .gallery-item:hover img { transform: scale(1.1); }
  .gallery-item img { transition: transform 0.8s cubic-bezier(0.25, 0.46, 0.45, 0.94); }

  .form-input {
    background: rgba(255,255,255,0.04);
    border: 1px solid rgba(212,175,55,0.2);
    color: white;
    transition: all 0.3s ease;
  }

  .form-input:focus {
    outline: none;
    border-color: #d4af37;
    background: rgba(212,175,55,0.05);
    box-shadow: 0 0 20px rgba(212,175,55,0.1);
  }

  .form-input::placeholder { color: rgba(255,255,255,0.3); }

  .map-placeholder {
    background:
      radial-gradient(circle at 30% 40%, rgba(44,62,45,0.3) 0%, transparent 50%),
      radial-gradient(circle at 70% 60%, rgba(212,175,55,0.05) 0%, transparent 40%),
      linear-gradient(135deg, #111 0%, #1a1a1a 50%, #0f0f0f 100%);
  }

  .footer-link {
    color: rgba(255,255,255,0.5);
    transition: color 0.3s ease;
    font-size: 0
