<!DOCTYPE html>
<html lang="lv">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Nature Interiors | Luxury Design</title>
<script src="https://cdn.tailwindcss.com"></script>
<script>
tailwind.config = {
  theme: {
    extend: {
      colors: {
        gold: '#D4AF37',
        bronze: '#8B7355',
        dark: '#0f0f0f',
        charcoal: '#1a1a1a',
      },
      fontFamily: {
        serif: ['Georgia', 'Times New Roman', 'serif'],
        sans: ['system-ui', 'sans-serif'],
      },
      animation: {
        'float': 'float 6s ease-in-out infinite',
        'shimmer': 'shimmer 3s ease-in-out infinite',
        'pulse-gold': 'pulseGold 2s ease-in-out infinite',
        'slide-up': 'slideUp 1s ease-out forwards',
      },
      keyframes: {
        float: {
          '0%, 100%': { transform: 'translateY(0px)' },
          '50%': { transform: 'translateY(-20px)' },
        },
        shimmer: {
          '0%, 100%': { opacity: '0.8' },
          '50%': { opacity: '1' },
        },
        pulseGold: {
          '0%, 100%': { boxShadow: '0 0 20px rgba(212,175,55,0.3)' },
          '50%': { boxShadow: '0 0 60px rgba(212,175,55,0.8)' },
        },
        slideUp: {
          '0%': { transform: 'translateY(60px)', opacity: '0' },
          '100%': { transform: 'translateY(0)', opacity: '1' },
        }
      }
    }
  }
}
</script>
<style>
  @import url('https://fonts.googleapis.com/css2?family=Cormorant+Garamond:ital,wght@0,300;0,400;0,600;1,300;1,400&family=Montserrat:wght@200;300;400;600;700&display=swap');

  * { box-sizing: border-box; }

  body {
    background: #000000;
    font-family: 'Montserrat', sans-serif;
    overflow-x: hidden;
    cursor: none;
  }

  .font-cormorant { font-family: 'Cormorant Garamond', serif; }
  .font-montserrat { font-family: 'Montserrat', sans-serif; }

  .custom-cursor {
    width: 20px;
    height: 20px;
    border: 2px solid #D4AF37;
    border-radius: 50%;
    position: fixed;
    pointer-events: none;
    z-index: 99999;
    transition: all 0.15s ease;
    transform: translate(-50%, -50%);
  }

  .cursor-dot {
    width: 6px;
    height: 6px;
    background: #D4AF37;
    border-radius: 50%;
    position: fixed;
    pointer-events: none;
    z-index: 99999;
    transform: translate(-50%, -50%);
  }

  .glass-nav {
    background: rgba(10, 10, 10, 0.75);
    backdrop-filter: blur(24px);
    -webkit-backdrop-filter: blur(24px);
    border-bottom: 1px solid rgba(212, 175, 55, 0.15);
  }

  .glass-card {
    background: rgba(255, 255, 255, 0.03);
    backdrop-filter: blur(20px);
    -webkit-backdrop-filter: blur(20px);
    border: 1px solid rgba(212, 175, 55, 0.12);
  }

  .glass-card-hover {
    transition: all 0.4s cubic-bezier(0.23, 1, 0.32, 1);
  }

  .glass-card-hover:hover {
    background: rgba(212, 175, 55, 0.06);
    border-color: rgba(212, 175, 55, 0.4);
    transform: translateY(-8px) scale(1.01);
    box-shadow: 0 40px 80px rgba(0,0,0,0.8), 0 0 60px rgba(212,175,55,0.1);
  }

  .hero-bg {
    background: linear-gradient(135deg, #1a1a1a 0%, #2d2d2d 25%, #0f0f0f 50%, #1e1e1e 75%, #000000 100%);
    position: relative;
  }

  .hero-bg::before {
    content: '';
    position: absolute;
    inset: 0;
    background: 
      radial-gradient(ellipse at 20% 50%, rgba(212,175,55,0.12) 0%, transparent 60%),
      radial-gradient(ellipse at 80% 20%, rgba(139,115,85,0.1) 0%, transparent 50%),
      radial-gradient(ellipse at 60% 80%, rgba(212,175,55,0.06) 0%, transparent 40%);
    pointer-events: none;
  }

  .gold-gradient-text {
    background: linear-gradient(135deg, #D4AF37 0%, #F5E6A3 30%, #D4AF37 60%, #8B7355 100%);
    -webkit-background-clip: text;
    -webkit-text-fill-color: transparent;
    background-clip: text;
  }

  .divider-gold {
    height: 1px;
    background: linear-gradient(90deg, transparent, #D4AF37, transparent);
  }

  .noise-overlay {
    position: fixed;
    inset: 0;
    pointer-events: none;
    z-index: 1;
    opacity: 0.025;
    background-image: url("data:image/svg+xml,%3Csvg viewBox='0 0 512 512' xmlns='http://www.w3.org/2000/svg'%3E%3Cfilter id='noise'%3E%3CfeTurbulence type='fractalNoise' baseFrequency='0.9' numOctaves='4' stitchTiles='stitch'/%3E%3C/filter%3E%3Crect width='100%25' height='100%25' filter='url(%23noise)'/%3E%3C/svg%3E");
  }

  .section-depth {
    position: relative;
  }

  .section-depth::before {
    content: '';
    position: absolute;
    top: 0;
    left: 0;
    right: 0;
    height: 200px;
    background: linear-gradient(to bottom, #000000, transparent);
    pointer-events: none;
    z-index: 2;
  }

  .section-depth::after {
    content: '';
    position: absolute;
    bottom: 0;
    left: 0;
    right: 0;
    height: 200px;
    background: linear-gradient(to top, #000000, transparent);
    pointer-events: none;
    z-index: 2;
  }

  .bento-grid {
    display: grid;
    grid-template-columns: repeat(12, 1fr);
    grid-template-rows: auto;
    gap: 1.5rem;
  }

  .bento-1 { grid-column: span 7; grid-row: span 2; }
  .bento-2 { grid-column: span 5; grid-row: span 1; }
  .bento-3 { grid-column: span 5; grid-row: span 1; }
  .bento-4 { grid-column: span 12; grid-row: span 1; }

  @media (max-width: 1024px) {
    .bento-1, .bento-2, .bento-3, .bento-4 { grid-column: span 12; grid-row: span 1; }
  }

  .lang-badge {
    display: inline-flex;
    align-items: center;
    gap: 4px;
    font-size: 10px;
    letter-spacing: 0.2em;
    text-transform: uppercase;
    padding: 4px 10px;
    border: 1px solid rgba(212,175,55,0.3);
    color: #D4AF37;
    background: rgba(212,175,55,0.05);
  }

  .glow-dot {
    width: 8px;
    height: 8px;
    background: #D4AF37;
    border-radius: 50%;
    box-shadow: 0 0 12px #D4AF37, 0 0 24px #D4AF37;
    animation: pulseGold 2s ease-in-out infinite;
  }

  .number-display {
    font-size: clamp(120px, 15vw, 200px);
    font-family: 'Cormorant Garamond', serif;
    font-weight: 300;
    line-height: 0.8;
    color: rgba(212,175,55,0.06);
    position: absolute;
    top: -20px;
    left: -20px;
