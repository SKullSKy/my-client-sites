<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>AI Website Factory - Dashboard</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;700&display=swap" rel="stylesheet">
    <style>
        body { font-family: 'Inter', sans-serif; background: #0f172a; color: white; }
        .card { background: #1e293b; border: 1px solid #334155; transition: 0.3s; }
        .card:hover { border-color: #38bdf8; transform: translateY(-5px); }
    </style>
</head>
<body class="p-8">
    <div class="max-w-6xl mx-auto">
        <header class="mb-12 border-b border-slate-700 pb-6">
            <h1 class="text-4xl font-bold text-sky-400">Project Dashboard</h1>
            <p class="text-slate-400 mt-2">Manage and view your AI-generated websites.</p>
        </header>

        <div id="project-list" class="grid grid-cols-1 md:grid-cols-3 gap-6">
            <div class="card p-6 rounded-xl">
                <h3 class="text-xl font-bold mb-2 text-white uppercase tracking-wider">Latest Project</h3>
                <p class="text-slate-400 mb-4">Click below to view the most recently generated site in your /sites folder.</p>
                <a href="./sites/" class="inline-block bg-sky-500 hover:bg-sky-600 text-white px-4 py-2 rounded-lg font-bold">
                    Browse All Sites
                </a>
            </div>
        </div>
    </div>

    <script>
        // Future automation: You can have n8n update this array 
        // every time a new site is built!
        console.log("Dashboard Loaded. Ensure your GitHub node saves to the /sites/ folder.");
    </script>
</body>
</html>
