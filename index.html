<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>AI Agency // Command Center</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Inter:wght@100;400;900&display=swap');
        body { font-family: 'Inter', sans-serif; background: #090317; overflow-x: hidden; }

        /* THE APPLE BUBBLE EFFECT */
        .bubble-bg {
            position: fixed; top: 0; left: 0; width: 100%; height: 100%;
            background: linear-gradient(180deg, #090317 0%, #1a0833 100%);
            z-index: -10;
        }
        .bubble {
            position: absolute; border-radius: 50%; filter: blur(80px); opacity: 0.4;
            animation: float 20s infinite ease-in-out;
        }
        .b1 { width: 500px; height: 500px; background: #ff00c8; top: -10%; left: -10%; }
        .b2 { width: 600px; height: 600px; background: #6e00ff; bottom: -10%; right: -10%; animation-delay: -5s; }
        @keyframes float {
            0%, 100% { transform: translate(0, 0) scale(1); }
            50% { transform: translate(40px, 60px) scale(1.1); }
        }

        .glass { background: rgba(255, 255, 255, 0.03); border: 1px solid rgba(255, 255, 255, 0.08); backdrop-filter: blur(20px); }
    </style>
</head>
<body class="text-slate-100 p-4 md:p-10">

    <div class="bubble-bg">
        <div class="bubble b1"></div>
        <div class="bubble b2"></div>
    </div>

    <div class="max-w-[1600px] mx-auto">
        <header class="glass rounded-full px-8 py-4 mb-10 flex items-center justify-between shadow-2xl">
            <div class="flex items-center gap-3">
                <div class="w-8 h-8 bg-purple-600 rounded-full flex items-center justify-center font-black text-white shadow-lg shadow-purple-500/50">S</div>
                <h1 class="text-xl font-bold tracking-tighter">SKULLSKY<span class="text-purple-400 font-light">_CORE</span></h1>
            </div>
            <div class="flex items-center gap-6">
                <div class="text-right">
                    <p class="text-slate-500 text-[10px] tracking-widest uppercase">Revenue_Total</p>
                    <p class="font-black text-xl text-emerald-400">$1,250.00</p>
                </div>
                <div class="w-10 h-10 rounded-full glass border border-purple-500/30 flex items-center justify-center text-xs font-mono">OP</div>
            </div>
        </header>

        <div class="grid grid-cols-1 xl:grid-cols-12 gap-8">
            <div class="xl:col-span-3 space-y-6">
                <div class="glass rounded-3xl p-6 flex items-center justify-between border-l-4 border-l-emerald-500">
                    <div>
                        <p class="text-slate-500 text-[10px] uppercase font-bold">System_Status</p>
                        <p class="text-white text-lg font-bold">Live & Ready</p>
                    </div>
                </div>

                <div class="glass rounded-3xl p-6 h-[500px] flex flex-col">
                    <h3 class="text-xs font-black text-purple-300 uppercase mb-5 tracking-widest border-b border-slate-800 pb-3">Build_Log</h3>
                    <ul id="file-list" class="space-y-3 overflow-y-auto">
                        <li class="text-slate-500 text-[10px] animate-pulse">Syncing with GitHub...</li>
                    </ul>
                </div>
            </div>

            <div class="xl:col-span-9">
                <div class="glass rounded-3xl shadow-2xl overflow-hidden h-[700px] flex flex-col border border-white/5">
                    <div class="bg-black/40 px-6 py-3 border-b border-white/5 flex items-center gap-4">
                        <div class="flex space-x-2">
                            <div class="w-3 h-3 rounded-full bg-red-500/50"></div>
                            <div class="w-3 h-3 rounded-full bg-yellow-500/50"></div>
                            <div class="w-3 h-3 rounded-full bg-green-500/50"></div>
                        </div>
                        <div class="flex-grow bg-black/20 rounded-full h-7 px-4 flex items-center justify-center border border-white/5">
                            <span id="view-title" class="text-[10px] font-mono text-slate-500">awaiting_deploy...</span>
                        </div>
                    </div>
                    <div class="w-full flex-grow bg-white m-2 rounded-2xl overflow-hidden">
                        <iframe id="viewer" src="about:blank" class="w-full h-full border-none"></iframe>
                    </div>
                </div>
            </div>
        </div>
    </div>

    <script>
        async function loadBuild() {
            try {
                // This fetches the latest.json without needing to hardcode your name
                const res = await fetch('./latest.json?v=' + Date.now());
                const data = await res.json();
                const slug = data.last_site;

                if (slug) {
                    const iframe = document.getElementById('viewer');
                    const title = document.getElementById('view-title');
                    const list = document.getElementById('file-list');

                    // Set URL
                    iframe.src = `./sites/${slug}/index.html`;
                    title.innerText = `DEPLOYED_AT: sites/${slug}/index.html`;

                    // Update History
                    list.innerHTML = `
                        <li class="bg-white/5 p-4 rounded-2xl border border-purple-500/20">
                            <p class="text-purple-400 font-black text-[10px]">ACTIVE_BUILD</p>
                            <p class="text-white text-[10px] font-mono mt-1 opacity-70">${slug}</p>
                            <a href="./sites/${slug}/index.html" target="_blank" class="mt-2 block text-center text-[10px] bg-purple-600/20 py-2 rounded-lg hover:bg-purple-600/40 transition">Open Fullscreen</a>
                        </li>
                    `;
                }
            } catch (e) {
                console.error("No builds found yet.");
            }
        }

        window.onload = loadBuild;
        setInterval(loadBuild, 15000); // Check for new builds every 15s
    </script>
</body>
</html>
