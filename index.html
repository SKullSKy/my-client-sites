<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Ahmands // Command Center</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Geist:wght@100;400;700;900&display=swap');
        body { font-family: 'Geist', sans-serif; background-color: #000000; color: #ffffff; margin: 0; min-height: 100vh; display: flex; align-items: center; justify-content: center; overflow: hidden; }

        /* --- APPLE DEPTH BUBBLES --- */
        .depth-bg { position: fixed; top: 0; left: 0; width: 100%; height: 100%; background: radial-gradient(circle at 80% 20%, #1a0033 0%, #000000 60%); z-index: -1; }
        .bubble { position: absolute; border-radius: 50%; filter: blur(100px); opacity: 0.3; animation: float 25s infinite ease-in-out; }
        .b1 { width: 400px; height: 400px; background: #7000ff; top: -5%; left: -5%; }
        .b2 { width: 350px; height: 350px; background: #ff00c8; bottom: 5%; right: 10%; animation-delay: -5s; }
        @keyframes float { 0%, 100% { transform: translate(0, 0) scale(1); } 50% { transform: translate(40px, 30px) scale(1.1); } }

        /* --- GLASS EFFECT --- */
        .ios-card { background: rgba(20, 20, 20, 0.6); backdrop-filter: blur(30px); border: 1px solid rgba(255, 255, 255, 0.08); border-radius: 20px; }
    </style>
</head>
<body class="p-4">

    <div class="depth-bg">
        <div class="bubble b1"></div>
        <div class="bubble b2"></div>
    </div>

    <div class="w-full max-w-5xl flex flex-col gap-4">
        
        <header class="ios-card px-6 py-3 flex items-center justify-between shadow-2xl">
            <div class="flex items-center gap-3">
                <div class="w-6 h-6 bg-gradient-to-tr from-purple-600 to-pink-500 rounded flex items-center justify-center font-black text-white text-[10px]">A</div>
                <h1 class="text-[10px] font-bold tracking-[0.3em] text-white uppercase opacity-90">Ahmands Core</h1>
            </div>
            <div class="flex gap-4">
                <div class="text-right">
                    <p class="text-[8px] text-slate-500 uppercase tracking-widest font-bold">Revenue</p>
                    <p class="text-sm font-black text-emerald-400 leading-none">$1,250</p>
                </div>
            </div>
        </header>

        <div class="flex gap-4 h-[550px]">
            <div class="w-60 flex flex-col gap-4 shrink-0">
                <div class="ios-card p-4">
                    <p class="text-[9px] text-slate-500 uppercase font-bold tracking-widest">Status</p>
                    <div class="flex items-center gap-2 mt-1">
                        <div class="w-2 h-2 rounded-full bg-emerald-500 animate-pulse"></div>
                        <p class="text-white text-xs font-bold uppercase tracking-tighter">Sync Active</p>
                    </div>
                </div>
                <div class="ios-card flex-1 p-4 flex flex-col overflow-hidden">
                    <h3 class="text-[9px] font-black text-purple-400 uppercase mb-3 tracking-widest">Build Log</h3>
                    <div id="file-list" class="space-y-2 overflow-y-auto">
                        <div class="p-3 rounded-lg bg-white/5 border border-white/5 text-[9px] text-slate-400 italic">No logs...</div>
                    </div>
                </div>
            </div>

            <div class="flex-1 ios-card flex flex-col overflow-hidden">
                <div class="bg-black/30 px-4 py-2 border-b border-white/5 flex items-center justify-between">
                    <div class="flex space-x-1.5">
                        <div class="w-2.5 h-2.5 rounded-full bg-red-500/50"></div>
                        <div class="w-2.5 h-2.5 rounded-full bg-yellow-500/50"></div>
                        <div class="w-2.5 h-2.5 rounded-full bg-green-500/50"></div>
                    </div>
                    <div id="view-title" class="text-[9px] font-mono text-slate-500 tracking-tight">ahmands.agency/ready</div>
                    <div class="w-8"></div>
                </div>
                <div class="flex-1 p-3">
                    <div class="w-full h-full rounded-xl bg-white overflow-hidden shadow-inner">
                        <iframe id="viewer" src="about:blank" class="w-full h-full border-none"></iframe>
                    </div>
                </div>
            </div>
        </div>

    </div>

    <script>
        async function update() {
            try {
                const res = await fetch('./latest.json?t=' + Date.now());
                const data = await res.json();
                const slug = data.last_site;
                if (slug && !document.getElementById('viewer').src.includes(slug)) {
                    document.getElementById('viewer').src = `./sites/${slug}/index.html`;
                    document.getElementById('view-title').innerText = `sites/${slug}/index.html`;
                    document.getElementById('file-list').innerHTML = `
                        <div class="bg-white/5 p-3 rounded-xl border border-purple-500/30">
                            <p class="text-[8px] font-bold text-purple-400 uppercase">Latest</p>
                            <p class="text-white font-mono text-[9px] mt-0.5 opacity-70">${slug}</p>
                            <a href="./sites/${slug}/index.html" target="_blank" class="mt-3 block text-center text-[8px] font-bold py-1.5 rounded bg-purple-600/20 hover:bg-purple-600/40 text-white transition-all">OPEN</a>
                        </div>`;
                }
            } catch (e) { console.log("Waiting..."); }
        }
        setInterval(update, 10000);
        update();
    </script>
</body>
</html>
