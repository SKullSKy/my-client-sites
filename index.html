<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>AI Agency // Command Center</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Geist:wght@100;400;900&display=swap');
        
        body { font-family: 'Geist', sans-serif; cursor: default; }

        /* --- THE APPLE BUBBLE EFFECT --- */
        .bubble-bg {
            position: fixed; top: 0; left: 0; width: 100%; height: 100%;
            background: linear-gradient(180deg, #090317 0%, #1a0833 100%);
            z-index: -10; overflow: hidden;
        }

        /* The floating spheres */
        .bubble-bg::after, .bubble-bg::before, .bubble-sphere {
            content: ''; position: absolute; border-radius: 50%;
            filter: blur(80px); opacity: 0.5; animation: floatBubble 25s infinite ease-in-out;
        }

        /* Sphere 1 (Top Left, Pinkish) */
        .bubble-bg::before {
            width: 400px; height: 400px; background: #ff00c8;
            top: -10%; left: -5%; animation-delay: -2s;
        }

        /* Sphere 2 (Bottom Right, Deep Purple) */
        .bubble-bg::after {
            width: 500px; height: 500px; background: #6e00ff;
            bottom: -15%; right: -10%; animation-delay: -5s;
        }

        /* Sphere 3 (Center, Cyan Pop) */
        .bubble-sphere {
            width: 300px; height: 300px; background: #00fff2;
            top: 40%; left: 30%; opacity: 0.3; animation-duration: 35s; animation-delay: -10s;
        }

        /* --- Animations --- */
        @keyframes floatBubble {
            0%, 100% { transform: translate(0, 0) scale(1); }
            25% { transform: translate(100px, 50px) scale(1.1); }
            50% { transform: translate(50px, 100px) scale(1); }
            75% { transform: translate(-50px, 50px) scale(0.9); }
        }

        @keyframes pulseOnline { 
            0%, 100% { opacity: 1; filter: drop-shadow(0 0 5px #4ade80); } 
            50% { opacity: 0.5; filter: drop-shadow(0 0 2px #4ade80); } 
        }
        .pulse { animation: pulseOnline 2s infinite; }

        /* Styling details */
        .glass { background: rgba(255, 255, 255, 0.03); border: 1px solid rgba(255, 255, 255, 0.08); backdrop-filter: blur(20px); -webkit-backdrop-filter: blur(20px); }
        .inner-glow { box-shadow: inset 0 0 15px rgba(168, 85, 247, 0.15); }
        
        ::-webkit-scrollbar { width: 4px; }
        ::-webkit-scrollbar-thumb { background: rgba(168, 85, 247, 0.3); border-radius: 10px; }
    </style>
</head>
<body class="text-slate-100 min-h-screen p-4 md:p-10">

    <div class="bubble-bg"><div class="bubble-sphere"></div></div>

    <div class="max-w-[1600px] mx-auto">
        
        <header class="glass rounded-full px-8 py-4 mb-10 flex items-center justify-between shadow-2xl">
            <div class="flex items-center gap-3">
                <div class="w-7 h-7 bg-purple-600 rounded-full flex items-center justify-center font-black text-xs text-white shadow-lg shadow-purple-500/30">AI</div>
                <h1 class="text-xl font-bold tracking-tighter text-white">Command<span class="text-purple-400 font-light">Center</span></h1>
            </div>
            
            <div class="flex items-center gap-6 text-sm">
                <div class="text-right">
                    <p class="text-slate-500 text-xs">REVENUE_GEN</p>
                    <p class="font-black text-xl text-emerald-400">$1,250.00</p>
                </div>
                <div class="h-10 w-px bg-slate-800"></div>
                <div class="w-10 h-10 rounded-full glass border border-purple-500/30 flex items-center justify-center text-xs font-mono text-purple-300">OP</div>
            </div>
        </header>

        <div class="grid grid-cols-1 xl:grid-cols-12 gap-8">
            
            <div class="xl:col-span-3 space-y-6">
                <div class="glass inner-glow rounded-3xl p-6 flex items-center justify-between">
                    <div>
                        <p class="text-slate-500 text-xs tracking-widest uppercase font-bold">Server_Status</p>
                        <p class="text-white text-lg font-bold mt-1">Operational</p>
                    </div>
                    <div class="w-6 h-6 rounded-full bg-emerald-950 border border-emerald-500 flex items-center justify-center">
                        <div class="w-2 h-2 rounded-full bg-emerald-400 pulse"></div>
                    </div>
                </div>

                <div class="glass rounded-3xl p-6 h-[550px] flex flex-col">
                    <h3 class="text-sm font-black text-purple-300 uppercase mb-5 tracking-widest border-b border-slate-800 pb-3">Build History</h3>
                    <ul id="file-list" class="space-y-3 overflow-y-auto flex-grow pr-2">
                        <li class="glass inner-glow p-4 rounded-xl border border-slate-800">
                            <p class="text-slate-500 font-mono text-[10px] italic">Waiting for n8n build...</p>
                        </li>
                    </ul>
                </div>
            </div>

            <div class="xl:col-span-9">
                <div class="glass rounded-3xl shadow-2xl overflow-hidden h-[670px] flex flex-col border border-purple-500/10">
                    
                    <div class="bg-slate-950/70 px-6 py-3 border-b border-slate-800 flex items-center gap-4">
                        <div class="flex space-x-2">
                            <div class="w-3 h-3 rounded-full bg-red-500/80"></div>
                            <div class="w-3 h-3 rounded-full bg-yellow-500/80"></div>
                            <div class="w-3 h-3 rounded-full bg-green-500/80"></div>
                        </div>
                        <div class="flex-grow glass rounded-full h-7 px-4 flex items-center justify-center border border-slate-700">
                            <span id="view-title" class="text-[10px] font-mono text-slate-500 tracking-wider">https://agency.ai/deployments/ready</span>
                        </div>
                        <div class="w-10"></div> </div>

                    <div class="w-full flex-grow bg-white m-4 rounded-xl overflow-hidden shadow-inner border border-slate-200">
                        <iframe id="viewer" src="about:blank" class="w-full h-full border-none"></iframe>
                    </div>
                </div>
            </div>

        </div>

        <footer class="mt-10 text-center text-slate-700 text-[10px] font-mono">
            // N8N_AGENT_SYSTEM v1.0 // Latency: --ms // AUTH_OK
        </footer>

    </div>

    <script>
        // Set your GitHub info here
        const GITHUB_USER = 'YOUR_USERNAME'; // REPLACE_ME
        const GITHUB_REPO = 'YOUR_REPO_NAME'; // REPLACE_ME

        async function autoLoad() {
            try {
                // Fetch the latest build pointer (stops cache)
                const res = await fetch('./latest.json?v=' + Date.now());
                if (!res.ok) throw new Error("latest.json not found");
                
                const data = await res.json();
                const slug = data.last_site;
                
                if(slug) {
                    const iframe = document.getElementById('viewer');
                    const title = document.getElementById('view-title');
                    
                    // Load the site
                    iframe.src = `./sites/${slug}/index.html`;
                    title.innerText = `https://agency.ai/deployments/${slug}`;

                    // Update History Sidebar
                    const list = document.getElementById('file-list');
                    const link = `https://${GITHUB_USER}.github.io/${GITHUB_REPO}/sites/${slug}/index.html`;
                    
                    list.innerHTML = `
                        <li class="glass inner-glow p-4 rounded-xl border border-purple-500/30 transition hover:border-purple-500">
                            <p class="text-purple-300 font-bold text-xs">Latest Build</p>
                            <a href="${link}" target="_blank" class="text-white text-[10px] font-mono mt-1 hover:text-purple-300 block truncate">${slug}</a>
                        </li>
                    `;
                }
            } catch (e) {
                console.log("Waiting for build data:", e.message);
            }
        }

        // Run immediately
        window.onload = autoLoad;
        // Check for new builds every 30 seconds
        setInterval(autoLoad, 30000);
    </script>
</body>
</html>
