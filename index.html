<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Ahmands // Command Center</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Geist:wght@100;400;700;900&display=swap');
        body { font-family: 'Geist', sans-serif; background-color: #000000; color: #ffffff; margin: 0; height: 100vh; overflow: hidden; }

        /* --- BACKGROUND FILLS ENTIRE SCREEN --- */
        .depth-bg { position: fixed; top: 0; left: 0; width: 100%; height: 100%; background: radial-gradient(circle at 80% 20%, #1a0033 0%, #000000 60%); z-index: -1; }
        .bubble { position: absolute; border-radius: 50%; filter: blur(100px); opacity: 0.3; animation: float 25s infinite ease-in-out; }
        .b1 { width: 500px; height: 500px; background: #7000ff; top: -5%; left: -5%; }
        .b2 { width: 450px; height: 450px; background: #ff00c8; bottom: 5%; right: 10%; animation-delay: -5s; }
        @keyframes float { 0%, 100% { transform: translate(0, 0) scale(1); } 50% { transform: translate(50px, 40px) scale(1.1); } }

        .ios-card { background: rgba(20, 20, 20, 0.6); backdrop-filter: blur(30px); border: 1px solid rgba(255, 255, 255, 0.08); border-radius: 24px; }
    </style>
</head>
<body class="p-8 flex flex-col items-center">

    <div class="depth-bg">
        <div class="bubble b1"></div>
        <div class="bubble b2"></div>
    </div>

    <header class="w-full max-w-[1400px] ios-card px-8 py-4 flex items-center justify-between mb-8 shadow-2xl">
        <div class="flex items-center gap-4">
            <div class="w-8 h-8 bg-gradient-to-tr from-purple-600 to-pink-500 rounded-lg flex items-center justify-center font-black text-white">A</div>
            <h1 class="text-xs font-bold tracking-[0.3em] text-white uppercase opacity-90">Ahmands Core <span class="font-light text-slate-500">// Command Center</span></h1>
        </div>
        <div class="text-right">
            <p class="text-[9px] text-slate-500 uppercase tracking-widest font-bold">Revenue</p>
            <p class="text-lg font-black text-emerald-400">$1,250.00</p>
        </div>
    </header>

    <div class="w-full max-w-[1200px] flex gap-8 items-start justify-center">
        
        <div class="w-72 flex flex-col gap-6 shrink-0">
            <div class="ios-card p-6">
                <p class="text-[10px] text-slate-500 uppercase font-bold tracking-widest">Status</p>
                <div class="flex items-center gap-3 mt-1">
                    <div class="w-2 h-2 rounded-full bg-emerald-500 animate-pulse shadow-[0_0_10px_#10b981]"></div>
                    <p class="text-white text-md font-bold">Sync Active</p>
                </div>
            </div>
            
            <div class="ios-card p-6 h-[400px] flex flex-col overflow-hidden">
                <h3 class="text-[10px] font-black text-purple-400 uppercase mb-4 tracking-widest">Build Log</h3>
                <div id="file-list" class="space-y-3 overflow-y-auto pr-2">
                    <div class="p-4 rounded-xl bg-white/5 border border-white/5 text-[10px] text-slate-400 italic">Listening for n8n...</div>
                </div>
            </div>
        </div>

        <div class="w-[800px] h-[550px] ios-card flex flex-col overflow-hidden shadow-2xl">
            <div class="bg-black/30 px-6 py-3 border-b border-white/5 flex items-center justify-between">
                <div class="flex space-x-2">
                    <div class="w-3 h-3 rounded-full bg-red-500/50"></div>
                    <div class="w-3 h-3 rounded-full bg-yellow-500/50"></div>
                    <div class="w-3 h-3 rounded-full bg-green-500/50"></div>
                </div>
                <div id="view-title" class="text-[10px] font-mono text-slate-500">ahmands.agency/viewer</div>
                <div class="w-10"></div>
            </div>
            <div class="flex-1 p-4 bg-transparent">
                <div class="w-full h-full rounded-xl bg-white overflow-hidden shadow-inner">
                    <iframe id="viewer" src="about:blank" class="w-full h-full border-none"></iframe>
                </div>
            </div>
        </div>

    </div>

    <script>
        async function update() {
            try {
                const res = await fetch('./latest.json?t=' + Date.now());
                const data = await res.json();
                const slug = data.last_site;
                if (slug && !document.getElementById('viewer').src.includes(slug)) {
                    document.getElementById('viewer').src = `./sites/${slug}/index.html`;
                    document.getElementById('view-title').innerText = `sites/${slug}/index.html`;
                    document.getElementById('file-list').innerHTML = `
                        <div class="bg-white/5 p-4 rounded-xl border border-purple-500/30">
                            <p class="text-[10px] font-bold text-purple-400 uppercase">Latest Deploy</p>
                            <p class="text-white font-mono text-[10px] mt-1 opacity-70">${slug}</p>
                            <a href="./sites/${slug}/index.html" target="_blank" class="mt-4 block text-center text-[9px] font-bold py-2 rounded-lg bg-purple-600/20 hover:bg-purple-600/40 text-white transition-all">VIEW FULLSCREEN</a>
                        </div>`;
                }
            } catch (e) { console.log("Searching..."); }
        }
        setInterval(update, 10000);
        update();
    </script>
</body>
</html>
