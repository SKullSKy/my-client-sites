<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Ahmands // Command Center</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Geist:wght@100;400;700;900&display=swap');
        
        body { 
            font-family: 'Geist', sans-serif; 
            background-color: #000000; 
            color: #ffffff;
            margin: 0;
            overflow: hidden;
        }

        /* --- APPLE DEPTH BUBBLES --- */
        .depth-bg {
            position: fixed; top: 0; left: 0; width: 100%; height: 100%;
            background: radial-gradient(circle at 80% 20%, #1a0033 0%, #000000 60%);
            z-index: -1;
        }

        .bubble {
            position: absolute; border-radius: 50%; filter: blur(100px);
            opacity: 0.3; animation: float 25s infinite ease-in-out;
        }
        .b1 { width: 450px; height: 450px; background: #7000ff; top: -5%; left: -5%; }
        .b2 { width: 400px; height: 400px; background: #ff00c8; bottom: 5%; right: 10%; animation-delay: -5s; }

        @keyframes float {
            0%, 100% { transform: translate(0, 0) scale(1); }
            50% { transform: translate(60px, 40px) scale(1.1); }
        }

        /* --- GLASS EFFECT (iOS STYLE) --- */
        .ios-card {
            background: rgba(15, 15, 15, 0.7);
            backdrop-filter: blur(30px);
            -webkit-backdrop-filter: blur(30px);
            border: 1px solid rgba(255, 255, 255, 0.05);
            border-radius: 24px;
        }

        .inner-glow:hover {
            box-shadow: inset 0 0 20px rgba(168, 85, 247, 0.1);
            border-color: rgba(168, 85, 247, 0.3);
        }

        ::-webkit-scrollbar { width: 0px; background: transparent; }
    </style>
</head>
<body class="p-6 h-screen flex flex-col gap-6">

    <div class="depth-bg">
        <div class="bubble b1"></div>
        <div class="bubble b2"></div>
    </div>

    <header class="ios-card px-8 py-4 flex items-center justify-between shrink-0">
        <div class="flex items-center gap-4">
            <div class="w-8 h-8 bg-gradient-to-tr from-purple-600 to-pink-500 rounded-lg flex items-center justify-center font-black text-white shadow-lg">A</div>
            <h1 class="text-sm font-bold tracking-[0.2em] text-white uppercase opacity-80">Ahmands Core <span class="font-light text-slate-500">// Command Center</span></h1>
        </div>
        <div class="flex items-center gap-8">
            <div class="text-right">
                <p class="text-[9px] text-slate-500 uppercase tracking-widest font-bold">Rev_Gen</p>
                <p class="text-lg font-black text-emerald-400">$1,250.00</p>
            </div>
            <div class="w-10 h-10 rounded-full border border-white/10 flex items-center justify-center text-[10px] font-mono text-slate-400 bg-white/5">OP</div>
        </div>
    </header>

    <main class="flex-grow flex gap-6 min-h-0">
        
        <aside class="w-80 flex flex-col gap-6 shrink-0">
            <div class="ios-card p-6 flex items-center justify-between">
                <div>
