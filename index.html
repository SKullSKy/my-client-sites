<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>AI Site Builder | Admin</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <style>
        body { background-color: #1a103f; font-family: 'Segoe UI', sans-serif; }
        .purple-gradient { background: linear-gradient(135deg, #6b21a8 0%, #4c1d95 100%); }
        .preview-window { background: #fff; border-radius: 8px; overflow: hidden; height: calc(100vh - 150px); }
    </style>
</head>
<body class="text-white">
    <div class="flex h-screen">
        <div class="w-1/4 purple-gradient p-6 shadow-2xl">
            <h1 class="text-2xl font-bold mb-8 border-b border-purple-400 pb-4">Architect Brain v2</h1>
            
            <div class="space-y-4">
                <p class="text-purple-200 text-sm uppercase tracking-widest">Active Projects</p>
                <div id="project-list" class="space-y-2">
                    <button onclick="loadSite('nature-interior')" class="w-full text-left p-3 rounded bg-purple-900 hover:bg-purple-700 transition">
                        🌿 Nature Interior
                    </button>
                </div>
            </div>
        </div>

        <div class="w-3/4 p-8 bg-slate-900">
            <div class="flex justify-between items-center mb-4">
                <h2 id="current-title" class="text-xl font-semibold">Live Preview</h2>
                <span class="px-3 py-1 bg-green-500 rounded-full text-xs font-bold uppercase">Connected</span>
            </div>
            
            <div class="preview-window shadow-inner">
                <iframe id="preview-frame" src="" class="w-full h-full border-none" title="Site Preview"></iframe>
            </div>
        </div>
    </div>

    <script>
        function loadSite(slug) {
            const frame = document.getElementById('preview-frame');
            const title = document.getElementById('current-title');
            // This points to the new /sites/ folder path
            frame.src = `./sites/${slug}/index.html`;
            title.innerText = "Previewing: " + slug.replace('-', ' ');
        }
    </script>
</body>
</html>
