<script>
    async function view(slug) {
        const viewer = document.getElementById('viewer');
        const title = document.getElementById('view-title');
        if(!slug) return;
        
        // Debugging log - Press F12 in your browser to see this!
        console.log("Attempting to load build:", slug);
        
        title.innerText = "Loading Build: " + slug + "...";
        viewer.src = `./sites/${slug}/index.html`;
        
        viewer.onload = () => title.innerText = "Viewing Build: " + slug;
        viewer.onerror = () => title.innerText = "Error: Build folder not found!";
    }

    async function autoLoad() {
        try {
            const response = await fetch('./latest.json?v=' + Date.now());
            if (!response.ok) throw new Error("latest.json not found");
            
            const data = await response.json();
            console.log("JSON Data received:", data);
            
            if (data.last_site) {
                view(data.last_site);
            }
        } catch (e) {
            document.getElementById('view-title').innerText = "Dashboard Ready - Waiting for first build...";
            console.error("Setup error:", e);
        }
    }

    window.onload = autoLoad;
</script>
