<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>AI Agency Dashboard</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <style>
        ::-webkit-scrollbar { width: 6px; }
        ::-webkit-scrollbar-thumb { background: #334155; border-radius: 10px; }
    </style>
</head>
<body class="bg-[#0f172a] text-slate-200 font-sans min-h-screen p-4 md:p-8">

    <div class="max-w-7xl mx-auto grid grid-cols-1 md:grid-cols-3 gap-6 mb-8">
        <div class="bg-slate-800/50 border border-slate-700 p-6 rounded-3xl backdrop-blur-md">
            <p class="text-slate-400 text-xs uppercase font-bold tracking-widest">Estimated Revenue</p>
            <h2 class="text-4xl font-black text-emerald-400 mt-2">$1,250.00</h2>
        </div>
        <div class="bg-slate-800/50 border border-slate-700 p-6 rounded-3xl backdrop-blur-md">
            <p class="text-slate-400 text-xs uppercase font-bold tracking-widest">Active Builds</p>
            <h2 id="build-count" class="text-4xl font-black text-blue-400 mt-2">Connecting...</h2>
        </div>
        <div class="bg-slate-800/50 border border-slate-700 p-6 rounded-3xl backdrop-blur-md">
            <p class="text-slate-400 text-xs uppercase font-bold tracking-widest">Server Status</p>
            <div class="flex items-center gap-3 mt-2">
                <div class="w-4 h-4 bg-emerald-500 rounded-full animate-pulse"></div>
                <h2 class="text-2xl font-bold text-white">Online</h2>
            </div>
        </div>
    </div>

    <div class="max-w-7xl mx-auto grid grid-cols-1 lg:grid-cols-12 gap-8">
        
        <div class="lg:col-span-3 bg-slate-800/30 border border-slate-700 rounded-3xl p-6 h-[650px] overflow-y-auto">
            <h3 class="text-sm font-black text-slate-500 uppercase mb-6 tracking-widest border-b border-slate-700 pb-2">Build History</h3>
            <ul id="file-list" class="space-y-4">
                <li class="text-xs text-slate-500 italic">Listening for n8n triggers...</li>
            </ul>
        </div>

        <div class="lg:col-span-9">
            <div class="bg-slate-900 border border-slate-700 rounded-3xl shadow-2xl overflow-hidden h-[650px] flex flex-col">
                <div class="bg-slate-800 px-6 py-3 border-b border-slate-700 flex items-center justify-between">
                    <div class="flex space-x-2">
                        <div class="w-3 h-3 rounded-full bg-slate-600"></div>
                        <div class="w-3 h-3 rounded-full bg-slate-600"></div>
                        <div class="w-3 h-3 rounded-full bg-slate-600"></div>
                    </div>
                    <span id="view-title" class="text-[10px] font-mono text-slate-500">READY_FOR_DEPLOYMENT</span>
                    <div class="w-10"></div>
                </div>
                <iframe id="viewer" src="about:blank" class="w-full h-full border-none bg-white"></iframe>
            </div>
        </div>
    </div>

    <script>
        async function autoLoad() {
            try {
                // Fetch the latest build info from n8n output
                const res = await fetch('./latest.json?v=' + Date.now());
                const data = await res.json();
                const slug = data.last_site;
                
                if(slug) {
                    const iframe = document.getElementById('viewer');
                    const title = document.getElementById('view-title');
                    
                    iframe.src = `./sites/${slug}/index.html`;
                    title.innerText = "VIEWING_BUILD: " + slug;
                    document.getElementById('build-count').innerText = "LIVE";

                    // Add to sidebar
                    const list = document.getElementById('file-list');
                    list.innerHTML = `
                        <li class="bg-slate-700/50 p-3 rounded-xl border border-blue-500/30">
                            <p class="text-blue-400 font-bold text-xs uppercase">Latest Build</p>
                            <p class="text-white text-[10px] font-mono mt-1">${slug}</p>
                        </li>
                    ` + list.innerHTML;
                }
            } catch (e) {
                console.log("No build data found.");
            }
        }
        window.onload = autoLoad;
        // Auto-refresh every 30 seconds to check for new n8n builds
        setInterval(autoLoad, 30000);
    </script>
</body>
</html>
