<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>AI Architect | Control Center</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <style>
        body { background-color: #0f0a1f; color: white; font-family: 'Inter', sans-serif; }
        .sidebar { background: #1a103f; border-right: 1px solid #3b2b63; }
        .preview-area { background: #090613; }
        .iframe-container { 
            background: white; 
            border-radius: 12px; 
            height: calc(100vh - 120px); 
            box-shadow: 0 0 40px rgba(0,0,0,0.5);
        }
        .project-btn {
            background: rgba(107, 33, 168, 0.2);
            border: 1px solid #6b21a8;
            transition: 0.2s;
        }
        .project-btn:hover { background: #6b21a8; }
    </style>
</head>
<body class="overflow-hidden">
    <div class="flex h-screen">
        <div class="w-80 sidebar p-6 flex flex-col">
            <h1 class="text-2xl font-bold text-purple-400 mb-8 tracking-tight">PROJECTS</h1>
            
            <div id="list" class="flex-grow space-y-3 overflow-y-auto">
                <button onclick="view('nature-interior')" class="w-full project-btn p-4 rounded-lg text-left font-medium">
                    🌿 Nature Interior
                </button>
            </div>

            <div class="mt-auto pt-6 border-t border-purple-900">
                <p class="text-xs text-purple-400 uppercase font-bold">System Status</p>
                <p class="text-green-400 text-sm italic">● AI Engines Online</p>
            </div>
        </div>

        <div class="flex-grow preview-area p-8">
            <div class="flex justify-between items-center mb-6">
                <h2 id="view-title" class="text-xl text-purple-200">Select a project to preview...</h2>
                <div class="flex gap-4">
                    <button onclick="refresh()" class="text-xs bg-slate-800 px-3 py-1 rounded">Reload</button>
                </div>
            </div>

            <div class="iframe-container">
                <iframe id="viewer" src="about:blank" class="w-full h-full rounded-xl border-none"></iframe>
            </div>
        </div>
    </div>

    <script>
        function view(slug) {
            const viewer = document.getElementById('viewer');
            const title = document.getElementById('view-title');
            // This pulls from your /sites/ folder
            viewer.src = `./sites/${slug}/index.html`;
            title.innerText = "Viewing: " + slug.toUpperCase();
        }
        function refresh() { document.getElementById('viewer').contentWindow.location.reload(); }
    </script>
</body>
</html>
