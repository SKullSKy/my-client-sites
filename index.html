<script>
    // Loads the folder into the window
    function view(slug) {
        const viewer = document.getElementById('viewer');
        const title = document.getElementById('view-title');
        if(!slug) return;
        
        viewer.src = `./sites/${slug}/index.html`;
        title.innerText = "Viewing Build: " + slug;
    }

    // Automatically finds the newest build from n8n
    async function autoLoad() {
        try {
            // The ?v= bit stops the browser from showing you an old version
            const response = await fetch('./latest.json?v=' + Date.now());
            const data = await response.json();
            view(data.last_site);
        } catch (e) {
            console.log("Dashboard ready. Send a Telegram message to see your first build!");
        }
    }

    window.onload = autoLoad;
</script>
