<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Ahmands // Command Center</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Geist:wght@100;400;700;900&display=swap');
        body { font-family: 'Geist', sans-serif; background-color: #000000; color: #ffffff; margin: 0; height: 100vh; overflow: hidden; display: flex; flex-direction: column; align-items: center; }
        .depth-bg { position: fixed; top: 0; left: 0; width: 100%; height: 100%; background: radial-gradient(circle at 80% 20%, #1a0033 0%, #000000 60%); z-index: -1; }
        .bubble { position: absolute; border-radius: 50%; filter: blur(100px); opacity: 0.25; animation: float 20s infinite ease-in-out; }
        .b1 { width: 500px; height: 500px; background: #7000ff; top: -10%; left: -5%; }
        .b2 { width: 450px; height: 450px; background: #ff00c8; bottom: 0%; right: 5%; animation-delay: -5s; }
        @keyframes float { 0%, 100% { transform: translate(0, 0) scale(1); } 50% { transform: translate(40px, 30px) scale(1.05); } }
        .ios-card { background: rgba(15, 15, 15, 0.7); backdrop-filter: blur(40px); border: 1px solid rgba(255, 255, 255, 0.08); border-radius: 28px; box-shadow: 0 25px 50px -12px rgba(0, 0, 0, 0.5); }
    </style>
</head>
<body class="p-6">
    <div class="depth-bg"><div class="bubble b1"></div><div class="bubble b2"></div></div>
    <header class="w-full max-w-[1300px] ios-card px-8 py-5 flex items-center justify-between mb-6">
        <div class="flex items-center gap-4">
            <div class="w-10 h-10 bg-gradient-to-tr from-purple-600 to-pink-500 rounded-xl flex items-center justify-center font-black text-white shadow-lg">A</div>
            <div>
                <h1 class="text-[11px] font-black tracking-[0.4em] text-white uppercase">Ahmands Core</h1>
                <p class="text-[9px] text-slate-500 font-medium tracking-widest uppercase">Autonomous Web Production</p>
            </div>
        </div>
        <div class="text-right">
            <p class="text-[8px] text-slate-500 uppercase font-bold tracking-[0.2em]">System Status</p>
            <p class="text-xs font-black text-emerald-400 tracking-tighter leading-none mt-1 uppercase">Live on Main</p>
        </div>
    </header>
    <main class="w-full max-w-[1300px] flex gap-6 flex-1 min-h-0">
        <div class="w-72 flex flex-col gap-6 shrink-0 h-full">
            <div class="ios-card flex-1 p-6 flex flex-col overflow-hidden">
                <h3 class="text-[10px] font-black text-purple-400 uppercase mb-4 tracking-[0.2em]">Deployment Log</h3>
                <div id="file-list" class="space-y-3 overflow-y-auto pr-2">
                    <div class="p-4 rounded-2xl bg-white/5 border border-white/5 text-[10px] text-slate-400 italic">Syncing with GitHub...</div>
                </div>
            </div>
        </div>
        <div class="flex-1 ios-card flex flex-col overflow-hidden bg-black/40">
            <div class="bg-black/40 px-6 py-4 border-b border-white/5 flex items-center justify-between">
                <div class="flex space-x-2">
                    <div class="w-3 h-3 rounded-full bg-red-500/20"></div>
                    <div class="w-3 h-3 rounded-full bg-yellow-500/20"></div>
                    <div class="w-3 h-3 rounded-full bg-green-500/20"></div>
                </div>
                <div id="view-title" class="text-[10px] font-mono text-slate-500 lowercase tracking-tighter">main/ready</div>
                <div class="w-12"></div>
            </div>
            <div class="flex-1 p-6 flex items-center justify-center bg-[#050505]">
                <div class="w-full max-w-[1000px] h-full bg-white rounded-2xl overflow-hidden shadow-2xl border border-white/5">
                    <iframe id="viewer" src="about:blank" class="w-full h-full border-none"></iframe>
                </div>
            </div>
        </div>
    </main>
    <script>
        async function update() {
            try {
                const res = await fetch('./latest.json?t=' + Date.now());
                if (!res.ok) return;
                const data = await res.json();
                const slug = data.last_site;
                if (slug && !document.getElementById('viewer').src.includes(slug)) {
                    document.getElementById('viewer').src = `./sites/${slug}/index.html`;
                    document.getElementById('view-title').innerText = `main/sites/${slug}/index.html`;
                    document.getElementById('file-list').innerHTML = `
                        <div class="ios-card bg-purple-600/10 p-5 border-purple-500/30 animate-in fade-in duration-500">
                            <p class="text-[9px] font-black text-purple-400 uppercase tracking-widest">Active build</p>
                            <p class="text-white font-mono text-[11px] mt-2 font-bold">${slug}</p>
                            <a href="./sites/${slug}/index.html" target="_blank" class="mt-4 block w-full text-center text-[9px] font-black py-2.5 rounded-xl bg-purple-600 hover:bg-purple-500 text-white transition-all uppercase">Full Screen</a>
                        </div>`;
                }
            } catch (e) { console.log("Waiting for signal..."); }
        }
        setInterval(update, 5000);
        update();
    </script>
</body>
</html>
